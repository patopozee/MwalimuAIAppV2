[server]
headless = true
enableCORS = true            # 🌟 FIXED: Keep active to enforce safe domain access
enableXsrfProtection = true  # 🌟 FIXED: Keeps cross-site cookie defense fully operational
maxMessageSize = 50


[client]
# Disables massive development tracking overhead strings, speeding up browser render paint times.
showErrorDetails = false

[runner]
# 🚀 MODERN REPLACEMENT ENGINES:
# Disables magic parsing to reduce CPU overhead and accelerate layout calculations.
magicEnabled = false

[browser]
# Drops analytics telemetry tracking background pings to save user network bandwidth.
gatherUsageStats = false

